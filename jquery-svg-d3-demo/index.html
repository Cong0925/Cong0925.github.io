<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jQuery SVG D3 Demo</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <div class="container">
        <h1>jQuery SVG D3 Demo</h1>
        <p class="description">基于 jQuery、SVG 和 D3.js 的交互式节点画布编辑器</p>
        <div class="features">
            <h2>功能特性</h2>
            <ul>
                <li>多种图形形状支持</li>
                <li>节点拖拽交互</li>
                <li>框选操作</li>
                <li>网格吸附功能</li>
                <li>连线样式配置</li>
                <li>D3.js 力导向图</li>
            </ul>
        </div>
        <div class="tech-stack">
            <h2>技术栈</h2>
            <span class="tag">jQuery</span>
            <span class="tag">SVG</span>
            <span class="tag">D3.js</span>
            <span class="tag">力导向图</span>
        </div>
        <div class="links">
            <a href="https://github.com/Cong0925/jquery-svg-d3-demo" target="_blank" class="btn">GitHub 仓库</a>
        </div>
    </div>
    <script src="./js/main.js"></script>
</body>
</html>
