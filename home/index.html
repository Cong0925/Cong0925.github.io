<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cong0925 - 项目导航</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Gitalk CSS -->
    <link rel="stylesheet" href="https://unpkg.com/gitalk/dist/gitalk.css">
</head>
<body>
    <!-- 主容器 -->
    <div class="container">
        <!-- 头部区域 -->
        <header class="header">
            <div class="header-top">
                <div class="avatar-wrapper">
                    <img src="https://avatars.githubusercontent.com/u/77568025?v=4" alt="Avatar" class="avatar">
                    <div class="avatar-glow"></div>
                </div>
                <div class="header-info">
                    <h1 class="name">Cong0925</h1>
                    <p class="bio">开发者 / 创作者 / 技术记录者</p>
                    <div class="header-stats">
                        <span class="stat-item">
                            <i class="fas fa-code-branch"></i>
                            <span id="projectCount">2</span> 个项目
                        </span>
                        <span class="stat-divider">·</span>
                            <span class="stat-item">
                            <i class="fab fa-github"></i>
                            开源爱好者
                        </span>
                    </div>
                </div>
                <a href="https://github.com/Cong0925" target="_blank" class="github-link">
                    <i class="fab fa-github"></i>
                    <span>GitHub</span>
                </a>
            </div>
        </header>

        <!-- 标题和搜索区域 -->
        <div class="title-section">
            <div class="title-content">
                <h2 class="main-title">精选开源项目</h2>
                <p class="subtitle">把想法变成可复用的代码作品</p>
            </div>
            <div class="search-box">
                <i class="fas fa-search search-icon"></i>
                <input type="text" id="searchInput" placeholder="搜索项目、技术笔记、开源作品" class="search-input">
                <button id="clearSearch" class="clear-btn" style="display: none;">
                    <i class="fas fa-times"></i>
                </button>
            </div>
        </div>

        <!-- 项目网格 -->
        <div class="projects-grid" id="projectsGrid">
            <!-- 项目卡片会通过JS动态生成 -->
        </div>

        <!-- 留言区域 -->
        <section class="message-section">
            <h2 class="section-title">
                <i class="fas fa-comments"></i>
                留言板
            </h2>
            <div id="gitalk-container"></div>
        </section>

        <!-- 页脚 -->
        <footer class="footer">
            <p>&copy; 2024 Cong0925. All rights reserved.</p>
        </footer>
    </div>

    <!-- Gitalk JS -->
    <script src="https://unpkg.com/gitalk/dist/gitalk.min.js"></script>
    <script src="./js/main.js"></script>
</body>
</html>
