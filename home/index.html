<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cong0925 - 项目导航</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Giscus CSS -->
    <link rel="stylesheet" href="https://giscus.app/default.css">
</head>
<body>
    <!-- 动态背景层 -->
    <div class="bg-layer" aria-hidden="true">
        <div class="bg-orb bg-orb-1"></div>
        <div class="bg-orb bg-orb-2"></div>
        <div class="bg-orb bg-orb-3"></div>
        <div class="bg-orb bg-orb-4"></div>
        <div class="bg-orb bg-orb-5"></div>
        <canvas id="particleCanvas"></canvas>
    </div>
    <div class="mouse-glow" aria-hidden="true"></div>

    <!-- 主容器 -->
    <div class="container">
        <!-- 骨架屏 -->
        <div id="skeleton-screen">
            <!-- 骨架屏头部 -->
            <div class="skeleton-header">
                <div class="skeleton skeleton-circle skeleton-avatar"></div>
                <div class="skeleton-header-info">
                    <div class="skeleton skeleton-text"></div>
                    <div class="skeleton skeleton-text-sm"></div>
                    <div class="skeleton skeleton-text-sm"></div>
                </div>
                <div class="skeleton skeleton-github-btn"></div>
            </div>

            <!-- 骨架屏标题区域 -->
            <div class="skeleton-title-section">
                <div class="skeleton-title-row">
                    <div class="skeleton-title-content">
                        <div class="skeleton skeleton-text"></div>
                        <div class="skeleton skeleton-text-sm"></div>
                    </div>
                    <div class="skeleton skeleton-search-box"></div>
                </div>
                <div class="skeleton-filter-bar">
                    <div class="skeleton-filter-group">
                        <div class="skeleton skeleton-filter-label"></div>
                        <div class="skeleton skeleton-filter-btn"></div>
                        <div class="skeleton skeleton-filter-btn"></div>
                        <div class="skeleton skeleton-filter-btn"></div>
                    </div>
                    <div class="skeleton-filter-group">
                        <div class="skeleton skeleton-filter-label"></div>
                        <div class="skeleton skeleton-filter-btn"></div>
                        <div class="skeleton skeleton-filter-btn"></div>
                        <div class="skeleton skeleton-filter-btn"></div>
                    </div>
                </div>
            </div>

            <!-- 骨架屏项目网格 -->
            <div class="skeleton-projects-grid">
                <div class="skeleton-card">
                    <div class="skeleton-card-header">
                        <div class="skeleton skeleton-card-title"></div>
                        <div class="skeleton skeleton-card-status"></div>
                    </div>
                    <div class="skeleton skeleton-card-type"></div>
                    <div class="skeleton-card-desc">
                        <div class="skeleton skeleton-text"></div>
                        <div class="skeleton skeleton-text"></div>
                        <div class="skeleton skeleton-text"></div>
                    </div>
                    <div class="skeleton-card-tags">
                        <div class="skeleton skeleton-tag"></div>
                        <div class="skeleton skeleton-tag"></div>
                        <div class="skeleton skeleton-tag"></div>
                    </div>
                    <div class="skeleton-card-meta">
                        <div class="skeleton skeleton-meta-item"></div>
                        <div class="skeleton skeleton-meta-item"></div>
                    </div>
                    <div class="skeleton-card-buttons">
                        <div class="skeleton skeleton-card-btn"></div>
                        <div class="skeleton skeleton-card-btn"></div>
                        <div class="skeleton skeleton-card-btn"></div>
                    </div>
                </div>
                <div class="skeleton-card">
                    <div class="skeleton-card-header">
                        <div class="skeleton skeleton-card-title"></div>
                        <div class="skeleton skeleton-card-status"></div>
                    </div>
                    <div class="skeleton skeleton-card-type"></div>
                    <div class="skeleton-card-desc">
                        <div class="skeleton skeleton-text"></div>
                        <div class="skeleton skeleton-text"></div>
                        <div class="skeleton skeleton-text"></div>
                    </div>
                    <div class="skeleton-card-tags">
                        <div class="skeleton skeleton-tag"></div>
                        <div class="skeleton skeleton-tag"></div>
                        <div class="skeleton skeleton-tag"></div>
                    </div>
                    <div class="skeleton-card-meta">
                        <div class="skeleton skeleton-meta-item"></div>
                        <div class="skeleton skeleton-meta-item"></div>
                    </div>
                    <div class="skeleton-card-buttons">
                        <div class="skeleton skeleton-card-btn"></div>
                        <div class="skeleton skeleton-card-btn"></div>
                        <div class="skeleton skeleton-card-btn"></div>
                    </div>
                </div>
                <div class="skeleton-card">
                    <div class="skeleton-card-header">
                        <div class="skeleton skeleton-card-title"></div>
                        <div class="skeleton skeleton-card-status"></div>
                    </div>
                    <div class="skeleton skeleton-card-type"></div>
                    <div class="skeleton-card-desc">
                        <div class="skeleton skeleton-text"></div>
                        <div class="skeleton skeleton-text"></div>
                        <div class="skeleton skeleton-text"></div>
                    </div>
                    <div class="skeleton-card-tags">
                        <div class="skeleton skeleton-tag"></div>
                        <div class="skeleton skeleton-tag"></div>
                        <div class="skeleton skeleton-tag"></div>
                    </div>
                    <div class="skeleton-card-meta">
                        <div class="skeleton skeleton-meta-item"></div>
                        <div class="skeleton skeleton-meta-item"></div>
                    </div>
                    <div class="skeleton-card-buttons">
                        <div class="skeleton skeleton-card-btn"></div>
                        <div class="skeleton skeleton-card-btn"></div>
                        <div class="skeleton skeleton-card-btn"></div>
                    </div>
                </div>
            </div>

            <!-- 骨架屏留言区域 -->
            <div class="skeleton-message-section">
                <div class="skeleton skeleton-message-title"></div>
                <div class="skeleton-message-content">
                    <div class="skeleton-message-item">
                        <div class="skeleton skeleton-circle skeleton-message-avatar"></div>
                        <div class="skeleton-message-body">
                            <div class="skeleton skeleton-text"></div>
                            <div class="skeleton skeleton-text"></div>
                            <div class="skeleton skeleton-text"></div>
                        </div>
                    </div>
                    <div class="skeleton-message-item">
                        <div class="skeleton skeleton-circle skeleton-message-avatar"></div>
                        <div class="skeleton-message-body">
                            <div class="skeleton skeleton-text"></div>
                            <div class="skeleton skeleton-text"></div>
                            <div class="skeleton skeleton-text"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 实际内容（初始隐藏） -->
        <div id="main-content" class="skeleton-hidden">
        <!-- 头部区域 -->
        <header class="header">
            <div class="header-top">
                <div class="avatar-wrapper">
                    <img src="https://avatars.githubusercontent.com/u/77568025?v=4" alt="Avatar" class="avatar">
                    <div class="avatar-glow"></div>
                </div>
                <div class="header-info">
                    <h1 class="name">Cong0925</h1>
                    <p class="bio">开发者 / 创作者 / 技术记录者</p>
                    <div class="header-stats">
                        <span class="stat-item">
                            <i class="fas fa-code-branch"></i>
                            <span id="projectCount">2</span> 个项目
                        </span>
                        <span class="stat-divider">·</span>
                            <span class="stat-item">
                            <i class="fab fa-github"></i>
                            开源爱好者
                        </span>
                    </div>
                </div>
                <a href="https://github.com/Cong0925" target="_blank" class="github-link">
                    <i class="fab fa-github"></i>
                    <span>GitHub</span>
                </a>
            </div>
        </header>

        <!-- 标题和搜索区域 -->
        <div class="title-section">
            <div class="title-row">
                <div class="title-content">
                    <h2 class="main-title">精选开源项目</h2>
                    <p class="subtitle">把想法变成可复用的代码作品</p>
                </div>
                <div class="search-box">
                    <i class="fas fa-search search-icon"></i>
                    <input type="text" id="searchInput" placeholder="搜索项目、技术笔记、开源作品" class="search-input">
                    <button id="clearSearch" class="clear-btn" style="display: none;">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
            </div>
            <div class="filter-bar">
                <div class="filter-group">
                    <span class="filter-label"><i class="fas fa-flag"></i> 状态</span>
                    <button class="filter-btn active" data-filter="status" data-value="all">全部</button>
                    <button class="filter-btn" data-filter="status" data-value="completed">已完成</button>
                    <button class="filter-btn" data-filter="status" data-value="development">进行中</button>
                    <button class="filter-btn" data-filter="status" data-value="stopped">停工</button>
                </div>
                <div class="filter-group">
                    <span class="filter-label"><i class="fas fa-th-large"></i> 类型</span>
                    <button class="filter-btn active" data-filter="type" data-value="all">全部</button>
                    <button class="filter-btn" data-filter="type" data-value="desktop">桌面软件</button>
                    <button class="filter-btn" data-filter="type" data-value="miniprogram">小程序</button>
                    <button class="filter-btn" data-filter="type" data-value="mobile">移动应用</button>
                    <button class="filter-btn" data-filter="type" data-value="web">网页应用</button>
                    <button class="filter-btn" data-filter="type" data-value="cli">终端工具</button>
                    <button class="filter-btn" data-filter="type" data-value="library">开源库</button>
                </div>
            </div>
        </div>

        <!-- 项目网格 -->
        <div class="projects-grid" id="projectsGrid">
            <!-- 项目卡片会通过JS动态生成 -->
        </div>

        <!-- 留言区域 -->
        <section class="message-section">
            <h2 class="section-title">
                <i class="fas fa-comments"></i>
                留言板
            </h2>
            <div id="giscus-container">
                <script src="https://giscus.app/client.js"
                    data-repo="Cong0925/Cong0925.github.io"
                    data-repo-id="R_kgDOTRFfAA"
                    data-category="Announcements"
                    data-category-id="DIC_kwDOTRFfAM4DA37K"
                    data-mapping="pathname"
                    data-strict="0"
                    data-reactions-enabled="1"
                    data-emit-metadata="0"
                    data-input-position="top"
                    data-theme="preferred_color_scheme"
                    data-lang="zh-CN"
                    data-loading="lazy"
                    crossorigin="anonymous"
                    async>
                </script>
            </div>
        </section>

        </div><!-- end main-content -->

        <!-- 页脚 -->
        <footer class="footer">
            <p>&copy; 2024 Cong0925. All rights reserved.</p>
        </footer>
    </div>

    <script src="./js/main.js"></script>
</body>
</html>
