<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hugo Blog</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <div class="container">
        <h1>Hugo Blog</h1>
        <p class="description">基于 Hugo Clarity 主题的个人博客系统</p>
        <div class="features">
            <h2>功能特性</h2>
            <ul>
                <li>中英文双语切换</li>
                <li>用户登录与验证码</li>
                <li>RSA 密码加密</li>
                <li>文章发布与管理</li>
                <li>深色模式支持</li>
                <li>响应式设计</li>
                <li>玻璃拟态风格登录弹窗</li>
            </ul>
        </div>
        <div class="tech-stack">
            <h2>技术栈</h2>
            <span class="tag">Hugo</span>
            <span class="tag">Hugo Clarity</span>
            <span class="tag">Glassmorphism</span>
            <span class="tag">JSEncrypt</span>
        </div>
        <div class="links">
            <a href="https://github.com/Cong0925/hugoBasicExample" target="_blank" class="btn">GitHub 仓库</a>
        </div>
    </div>
    <script src="./js/main.js"></script>
</body>
</html>
