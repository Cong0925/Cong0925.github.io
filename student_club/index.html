<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Club</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <div class="container">
        <h1>Student Club</h1>
        <p class="description">学生社团管理系统</p>
        <div class="features">
            <h2>前台功能</h2>
            <ul>
                <li>社团列表展示</li>
                <li>活动信息展示</li>
                <li>新闻通知浏览</li>
                <li>成员风采展示</li>
            </ul>
        </div>
        <div class="features">
            <h2>后台管理</h2>
            <ul>
                <li>社团管理</li>
                <li>成员审核</li>
                <li>内容发布</li>
                <li>活动管理</li>
            </ul>
        </div>
        <div class="tech-stack">
            <h2>技术栈</h2>
            <span class="tag">Vue3</span>
            <span class="tag">Element Plus</span>
            <span class="tag">TinyMCE</span>
            <span class="tag">Pinia</span>
        </div>
        <div class="links">
            <a href="https://github.com/Cong0925/student_club" target="_blank" class="btn">GitHub 仓库</a>
        </div>
    </div>
    <script src="./js/main.js"></script>
</body>
</html>
